<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="Mermaid Diagram Editor - UTM Code Editor">
    <title>Mermaid UTM Editor</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1><i class="fa-solid fa-diagram-project"></i> Mermaid UTM Editor</h1>
        <div class="header-actions">
            <button id="promptBtn" class="prompt-btn"><i class="fa-solid fa-robot"></i> Prompt AI</button>
            <button id="installBtn" class="install-btn hidden"><i class="fa-solid fa-download"></i> Install</button>
        </div>
    </header>

    <main class="container">
        <!-- Left Panel - Editor -->
        <section class="panel editor-panel">
            <div class="panel-header">
                <h2><i class="fa-solid fa-code"></i> Code Editor</h2>
                <div class="editor-actions">
                    <button id="formatBtn" class="btn btn-secondary" title="Format code">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> Format
                    </button>
                    <button id="clearBtn" class="btn btn-secondary" title="Clear">
                        <i class="fa-solid fa-trash"></i> Clear
                    </button>
                </div>
            </div>
            <textarea id="codeEditor" placeholder="Enter MermaidJS code here...

Example:
graph TD
    A[Start] --> B{Condition}
    B -->|Yes| C[Action 1]
    B -->|No| D[Action 2]
    C --> E[End]
    D --> E">graph TD
    A[Campaign Start] --> B{UTM Source?}
    B -->|Facebook| C[utm_source=facebook]
    B -->|Google| D[utm_source=google]
    B -->|Email| E[utm_source=email]
    
    C --> F{UTM Medium?}
    D --> F
    E --> F
    
    F -->|CPC| G[utm_medium=cpc]
    F -->|Social| H[utm_medium=social]
    F -->|Newsletter| I[utm_medium=newsletter]
    
    G --> J[Analytics]
    H --> J
    I --> J
    
    J --> K[Campaign Name]
    K --> L[utm_campaign=summer_sale_2024]
    
    L --> M{Success?}
    M -->|Yes| N[Convert]
    M -->|No| O[Retarget]</textarea>
            <div class="examples">
                <span>Mẫu:</span>
                <button class="example-btn" data-example="flowchart">Flowchart</button>
                <button class="example-btn" data-example="sequence">Sequence</button>
                <button class="example-btn" data-example="class">Class</button>
                <button class="example-btn" data-example="gantt">Gantt</button>
                <button class="example-btn" data-example="pie">Pie</button>
                <button class="example-btn" data-example="utm">UTM Flow</button>
            </div>
        </section>

        <!-- Right Panel - Preview -->
        <section class="panel preview-panel">
            <div class="panel-header">
                <h2><i class="fa-solid fa-eye"></i> Preview</h2>
                <div class="preview-actions">
                    <button id="renderBtn" class="btn btn-primary" title="Render diagram">
                        <i class="fa-solid fa-play"></i> Render
                    </button>
                    <button id="copyBtn" class="btn btn-success" title="Copy image to clipboard">
                        <i class="fa-solid fa-copy"></i> Copy
                    </button>
                    <button id="saveBtn" class="btn btn-success" title="Save as PNG">
                        <i class="fa-solid fa-image"></i> PNG
                    </button>
                    <button id="saveSvgBtn" class="btn btn-success" title="Save as SVG">
                        <i class="fa-solid fa-vector-square"></i> SVG
                    </button>
                </div>
            </div>
            <div id="preview" class="preview-container">
                <div id="mermaidOutput" class="mermaid-output"></div>
            </div>
            <div class="zoom-controls">
                <button id="zoomOutBtn" class="zoom-btn"><i class="fa-solid fa-minus"></i></button>
                <span id="zoomLevel">200%</span>
                <button id="zoomInBtn" class="zoom-btn"><i class="fa-solid fa-plus"></i></button>
                <button id="zoomResetBtn" class="zoom-btn"><i class="fa-solid fa-rotate"></i></button>
            </div>
        </section>
    </main>

    <footer>
        <p>Made with <i class="fa-solid fa-heart" style="color: #ef4444;"></i> using Mermaid.js | PWA Ready</p>
    </footer>

    <div id="toast" class="toast hidden"></div>

    <!-- Prompt Modal -->
    <div id="promptModal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fa-solid fa-robot"></i> AI Prompt Generator</h2>
                <button id="closeModalBtn" class="modal-close"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div class="prompt-options">
                    <div class="option-group">
                        <label><i class="fa-solid fa-globe"></i> Language</label>
                        <select id="langSelect">
                            <option value="vi">Tiếng Việt</option>
                            <option value="en">English</option>
                            <option value="ja">日本語</option>
                        </select>
                    </div>
                    <div class="option-group">
                        <label><i class="fa-solid fa-chart-pie"></i> Chart Type</label>
                        <select id="chartSelect">
                            <option value="flowchart">Flowchart</option>
                            <option value="sequence">Sequence Diagram</option>
                            <option value="pie">Pie Chart</option>
                            <option value="gantt">Gantt Chart</option>
                            <option value="mindmap">Mind Map</option>
                        </select>
                    </div>
                </div>
                <textarea id="promptTemplate" readonly></textarea>
            </div>
            <div class="modal-footer">
                <button id="copyPromptBtn" class="btn btn-primary"><i class="fa-solid fa-copy"></i> Copy Prompt</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
