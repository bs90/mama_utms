<!DOCTYPE html>
<html>
<head>
    <title>Generate PWA Icons</title>
</head>
<body>
    <h1>Generate Icons</h1>
    <p>Click the button to generate and download all PWA icons</p>
    <button id="generateBtn">Generate All Icons</button>
    <div id="status"></div>
    <div id="preview" style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px;"></div>

    <script>
        const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
        
        function createIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // Gradient background
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#6366f1');
            gradient.addColorStop(1, '#8b5cf6');
            
            // Rounded rectangle
            const radius = size * 0.1875;
            ctx.beginPath();
            ctx.moveTo(radius, 0);
            ctx.lineTo(size - radius, 0);
            ctx.quadraticCurveTo(size, 0, size, radius);
            ctx.lineTo(size, size - radius);
            ctx.quadraticCurveTo(size, size, size - radius, size);
            ctx.lineTo(radius, size);
            ctx.quadraticCurveTo(0, size, 0, size - radius);
            ctx.lineTo(0, radius);
            ctx.quadraticCurveTo(0, 0, radius, 0);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // Letter M
            ctx.fillStyle = 'white';
            ctx.font = `bold ${size * 0.4}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('M', size * 0.5, size * 0.55);
            
            // Green circle with U
            const circleX = size * 0.74;
            const circleY = size * 0.27;
            const circleR = size * 0.12;
            ctx.beginPath();
            ctx.arc(circleX, circleY, circleR, 0, Math.PI * 2);
            ctx.fillStyle = '#10b981';
            ctx.fill();
            
            ctx.fillStyle = 'white';
            ctx.font = `bold ${size * 0.12}px Arial`;
            ctx.fillText('U', circleX, circleY + size * 0.01);
            
            return canvas;
        }
        
        function downloadIcon(canvas, size) {
            const link = document.createElement('a');
            link.download = `icon-${size}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
        
        document.getElementById('generateBtn').addEventListener('click', () => {
            const status = document.getElementById('status');
            const preview = document.getElementById('preview');
            preview.innerHTML = '';
            
            sizes.forEach((size, index) => {
                setTimeout(() => {
                    const canvas = createIcon(size);
                    downloadIcon(canvas, size);
                    
                    // Show preview
                    const div = document.createElement('div');
                    div.style.textAlign = 'center';
                    const img = document.createElement('img');
                    img.src = canvas.toDataURL('image/png');
                    img.style.width = '64px';
                    img.style.height = '64px';
                    const label = document.createElement('div');
                    label.textContent = `${size}x${size}`;
                    label.style.fontSize = '12px';
                    div.appendChild(img);
                    div.appendChild(label);
                    preview.appendChild(div);
                    
                    status.textContent = `Generated icon-${size}.png (${index + 1}/${sizes.length})`;
                }, index * 300);
            });
        });
    </script>
</body>
</html>
